services:
  db:
    image: postgres:16
    container_name: contas_residenciais_db_deploy
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contas_residenciais_deploy
    ports:
      - "5432:5432"
    volumes:
      - contas_residenciais_pg_deploy:/var/lib/postgresql/data

volumes:
  contas_residenciais_pg_deploy:
